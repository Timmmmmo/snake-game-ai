<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇大作战 - 游骑工作室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; }
        body { 
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #fff; user-select: none; -webkit-user-select: none;
        }
        
        /* 开始界面 */
        #startScreen { text-align: center; }
        .logo { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 0 30px rgba(0,255,200,0.5); }
        .logo-sub { font-size: 1rem; color: rgba(255,255,255,0.5); margin-bottom: 40px; }
        .play-btn {
            width: 160px; height: 160px; border-radius: 50%;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            border: none; cursor: pointer;
            font-size: 1.3rem; color: #0a0a1a; font-weight: bold;
            box-shadow: 0 0 60px rgba(0,255,200,0.4), inset 0 -4px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .play-btn:active { transform: scale(0.95); }
        .best-score { margin-top: 30px; font-size: 0.9rem; color: rgba(255,255,255,0.4); }
        .best-score span { color: #ffd700; }
        
        /* 游戏界面 */
        #gameScreen { display: none; text-align: center; }
        .hud {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 420px; padding: 10px 15px; margin-bottom: 5px;
        }
        .score-display { text-align: left; }
        .score-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); }
        .score-value { font-size: 2rem; font-weight: bold; color: #00ffcc; text-shadow: 0 0 20px rgba(0,255,200,0.5); }
        .combo-display { text-align: right; }
        .combo-value { font-size: 1.5rem; font-weight: bold; color: #ff6b6b; }
        .combo-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); }
        
        #gameCanvas { 
            border-radius: 16px; 
            box-shadow: 0 0 40px rgba(0,255,200,0.15), 0 0 1px rgba(0,255,200,0.3);
            border: 1px solid rgba(0,255,200,0.2);
            max-width: 95vw; max-height: 65vh;
        }
        
        .game-footer { margin-top: 10px; font-size: 0.7rem; color: rgba(255,255,255,0.3); }
        
        /* 结算界面 */
        #endScreen { display: none; text-align: center; }
        .result-title { font-size: 2rem; margin-bottom: 20px; }
        .result-title.win { color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .result-title.lose { color: #ff6b6b; }
        .final-score-big { font-size: 4rem; font-weight: bold; color: #00ffcc; text-shadow: 0 0 40px rgba(0,255,200,0.5); }
        .result-detail { margin: 20px 0; font-size: 0.9rem; color: rgba(255,255,255,0.5); }
        .result-detail div { margin: 5px 0; }
        .result-detail span { color: #ffd700; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn-restart {
            padding: 15px 40px; border-radius: 30px; border: none; cursor: pointer;
            font-size: 1rem; font-weight: bold; color: #0a0a1a;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            box-shadow: 0 0 30px rgba(0,255,200,0.3);
        }
        .btn-share {
            padding: 15px 30px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.3); 
            cursor: pointer; font-size: 1rem; color: #fff; background: transparent;
        }
        
        /* 得分弹出 */
        .score-popup {
            position: fixed; font-size: 1.5rem; font-weight: bold; color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
            pointer-events: none; z-index: 100;
            animation: popUp 0.6s ease-out forwards;
        }
        @keyframes popUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div id="startScreen">
        <div class="logo">🐍 贪吃蛇大作战</div>
        <div class="logo-sub">游骑工作室</div>
        <button class="play-btn" onclick="startGame()">开始</button>
        <div class="best-score">最高分: <span id="bestScoreStart">0</span></div>
    </div>
    
    <!-- 游戏界面 -->
    <div id="gameScreen">
        <div class="hud">
            <div class="score-display">
                <div class="score-label">得分</div>
                <div class="score-value" id="scoreDisplay">0</div>
            </div>
            <div class="combo-display">
                <div class="combo-value" id="comboDisplay">×1</div>
                <div class="combo-label">连击</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="560"></canvas>
        <div class="game-footer">滑动屏幕控制方向 · 吃食物得高分 · 避免撞墙和自身</div>
    </div>
    
    <!-- 结算界面 -->
    <div id="endScreen">
        <div class="result-title" id="resultTitle">游戏结束</div>
        <div class="final-score-big" id="finalScore">0</div>
        <div class="result-detail">
            <div>存活时间: <span id="resultTime">0</span>秒</div>
            <div>最高连击: <span id="resultCombo">×0</span></div>
            <div>吃到食物: <span id="resultFood">0</span>个</div>
        </div>
        <div class="best-score">历史最高: <span id="bestScoreEnd">0</span></div>
        <div class="btn-group">
            <button class="btn-restart" onclick="startGame()">再来一局</button>
            <button class="btn-share" onclick="shareGame()">分享炫耀</button>
        </div>
    </div>

    <script>
    // ====== 配置 ======
    const COLS = 20, ROWS = 28, CELL = 20;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // ====== 游戏状态 ======
    let snake, foods, particles, obstacles, gameState;
    let score, combo, maxCombo, foodEaten, startTime;
    let bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
    let lastFrame = 0, accumulator = 0;
    const TICK = 120; // 每帧间隔ms
    
    // ====== 颜色主题 ======
    const COLORS = {
        bg: '#0a0a1a',
        grid: 'rgba(0,255,200,0.05)',
        snake: ['#00ffcc', '#00ccff', '#00ff88'],
        snakeGlow: 'rgba(0,255,200,0.3)',
        food: '#ff6b6b',
        foodGlow: 'rgba(255,107,107,0.5)',
        obstacle: 'rgba(255,100,100,0.4)',
        particle: ['#ffd700', '#ff6b6b', '#00ffcc', '#ff69b4', '#7ee787'],
        text: '#fff',
        combo: '#ff6b6b',
    };
    
    // ====== 初始化 ======
    document.getElementById('bestScoreStart').textContent = bestScore;
    
    // ====== 游戏开始 ======
    function startGame() {
        snake = {
            body: [{x: 10, y: 14}],
            dir: {x: 0, y: -1},
            nextDir: {x: 0, y: -1},
            colors: COLORS.snake,
        };
        foods = [];
        particles = [];
        obstacles = [];
        score = 0;
        combo = 0;
        maxCombo = 0;
        foodEaten = 0;
        startTime = Date.now();
        
        spawnFood();
        spawnFood();
        spawnFood();
        
        gameState = 'playing';
        
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('scoreDisplay').textContent = '0';
        document.getElementById('comboDisplay').textContent = '×1';
        
        requestAnimationFrame(gameLoop);
    }
    
    // ====== 游戏主循环 ======
    function gameLoop(ts) {
        if (gameState !== 'playing') return;
        
        const dt = ts - lastFrame;
        lastFrame = ts;
        accumulator += dt;
        
        while (accumulator >= TICK) {
            update();
            accumulator -= TICK;
        }
        
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // ====== 更新逻辑 ======
    function update() {
        // 方向更新
        snake.dir = {...snake.nextDir};
        
        const head = {x: snake.body[0].x + snake.dir.x, y: snake.body[0].y + snake.dir.y};
        
        // 边界检测
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
            endGame(false);
            return;
        }
        
        // 撞自身
        for (let i = 0; i < snake.body.length - 1; i++) {
            if (head.x === snake.body[i].x && head.y === snake.body[i].y) {
                endGame(false);
                return;
            }
        }
        
        // 撞障碍物
        for (const obs of obstacles) {
            if (head.x === obs.x && head.y === obs.y) {
                endGame(false);
                return;
            }
        }
        
        snake.body.unshift(head);
        
        // 吃食物检测
        let ate = false;
        for (let i = foods.length - 1; i >= 0; i--) {
            if (head.x === foods[i].x && head.y === foods[i].y) {
                // 吃到食物
                combo++;
                maxCombo = Math.max(maxCombo, combo);
                foodEaten++;
                
                // 分数 = 基础分 * 连击倍率
                const add = 10 * Math.min(combo, 10);
                score += add;
                
                // 粒子效果
                spawnParticles(foods[i].x * CELL + CELL/2, foods[i].y * CELL + CELL/2, 15);
                
                // 得分弹出
                showScorePopup(foods[i].x * CELL + CELL/2, foods[i].y * CELL, '+' + add);
                
                // 蛇身变长（多留一节）
                snake.body.push({...snake.body[snake.body.length - 1]});
                
                foods.splice(i, 1);
                spawnFood();
                ate = true;
                
                document.getElementById('scoreDisplay').textContent = score;
                document.getElementById('comboDisplay').textContent = '×' + Math.min(combo, 10);
            }
        }
        
        if (!ate) {
            snake.body.pop();
            combo = 0;
            document.getElementById('comboDisplay').textContent = '×1';
        }
        
        // 随时间增加障碍物
        const elapsed = (Date.now() - startTime) / 1000;
        if (elapsed > 15 && obstacles.length < 10 && Math.random() < 0.01) {
            let x, y, attempts = 0;
            do {
                x = Math.floor(Math.random() * COLS);
                y = Math.floor(Math.random() * ROWS);
                attempts++;
            } while ((x === snake.body[0].x && y === snake.body[0].y || isNearHead(x, y)) && attempts < 20);
            if (attempts < 20) {
                obstacles.push({x, y});
                spawnParticles(x * CELL + CELL/2, y * CELL + CELL/2, 8, '#ff6b6b');
            }
        }
        
        // 粒子更新
        particles = particles.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            p.size *= 0.95;
            return p.life > 0;
        });
    }
    
    function isNearHead(x, y) {
        const h = snake.body[0];
        return Math.abs(x - h.x) <= 2 && Math.abs(y - h.y) <= 2;
    }
    
    // ====== 绘制 ======
    function draw() {
        // 背景
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 网格
        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= COLS; x++) {
            ctx.beginPath();
            ctx.moveTo(x * CELL, 0);
            ctx.lineTo(x * CELL, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y <= ROWS; y++) {
            ctx.beginPath();
            ctx.moveTo(0, y * CELL);
            ctx.lineTo(canvas.width, y * CELL);
            ctx.stroke();
        }
        
        // 障碍物
        for (const obs of obstacles) {
            ctx.fillStyle = COLORS.obstacle;
            ctx.beginPath();
            ctx.roundRect(obs.x * CELL + 1, obs.y * CELL + 1, CELL - 2, CELL - 2, 4);
            ctx.fill();
        }
        
        // 食物
        for (const food of foods) {
            const cx = food.x * CELL + CELL / 2;
            const cy = food.y * CELL + CELL / 2;
            
            // 光晕
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, CELL);
            grad.addColorStop(0, COLORS.foodGlow);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(food.x * CELL - 3, food.y * CELL - 3, CELL + 6, CELL + 6);
            
            // 食物本体
            ctx.fillStyle = COLORS.food;
            ctx.beginPath();
            ctx.arc(cx, cy, CELL / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 高光
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(cx - 3, cy - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 蛇
        for (let i = snake.body.length - 1; i >= 0; i--) {
            const seg = snake.body[i];
            const colorIdx = Math.floor(i / 3) % snake.colors.length;
            
            if (i === 0) {
                // 蛇头
                ctx.fillStyle = snake.colors[0];
                ctx.shadowColor = COLORS.snakeGlow;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 6);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 眼睛
                ctx.fillStyle = '#fff';
                const ex = 5, ey = 4;
                if (snake.dir.y !== 0) {
                    ctx.fillRect(seg.x * CELL + 4, seg.y * CELL + CELL/2 - ey/2, ex, ey);
                    ctx.fillRect(seg.x * CELL + CELL - 4 - ex, seg.y * CELL + CELL/2 - ey/2, ex, ey);
                } else {
                    ctx.fillRect(seg.x * CELL + CELL/2 - ey/2, seg.y * CELL + 4, ey, ex);
                    ctx.fillRect(seg.x * CELL + CELL/2 - ey/2, seg.y * CELL + CELL - 4 - ex, ey, ex);
                }
            } else {
                // 蛇身 - 渐变色
                const alpha = 1 - (i / snake.body.length) * 0.5;
                ctx.fillStyle = snake.colors[colorIdx];
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.roundRect(seg.x * CELL + 2, seg.y * CELL + 2, CELL - 4, CELL - 4, 4);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // 粒子
        for (const p of particles) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
    
    // ====== 生成食物 ======
    function spawnFood() {
        let x, y, attempts = 0;
        do {
            x = Math.floor(Math.random() * COLS);
            y = Math.floor(Math.random() * ROWS);
            attempts++;
        } while (isOccupied(x, y) && attempts < 50);
        
        if (attempts < 50) {
            foods.push({x, y});
        }
    }
    
    function isOccupied(x, y) {
        for (const f of foods) if (f.x === x && f.y === y) return true;
        for (const s of snake.body) if (s.x === x && s.y === y) return true;
        for (const o of obstacles) if (o.x === x && o.y === y) return true;
        return false;
    }
    
    // ====== 粒子系统 ======
    function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 4;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: 3 + Math.random() * 4,
                color: color || COLORS.particle[Math.floor(Math.random() * COLORS.particle.length)],
                life: 20 + Math.random() * 20,
                maxLife: 40,
            });
        }
    }
    
    // ====== 得分弹出 ======
    function showScorePopup(x, y, text) {
        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.textContent = text;
        popup.style.left = (canvas.offsetLeft + x) + 'px';
        popup.style.top = (canvas.offsetTop + y) + 'px';
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 600);
    }
    
    // ====== 游戏结束 ======
    function endGame(win) {
        gameState = 'ended';
        
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('snakeBest', score);
        }
        
        const elapsed = Math.round((Date.now() - startTime) / 1000);
        
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'block';
        
        const title = document.getElementById('resultTitle');
        title.textContent = score > 50 ? '🎉 太厉害了!' : '💀 游戏结束';
        title.className = 'result-title ' + (score > 50 ? 'win' : 'lose');
        
        document.getElementById('finalScore').textContent = score;
        document.getElementById('resultTime').textContent = elapsed;
        document.getElementById('resultCombo').textContent = '×' + maxCombo;
        document.getElementById('resultFood').textContent = foodEaten;
        document.getElementById('bestScoreEnd').textContent = bestScore;
    }
    
    // ====== 分享 ======
    function shareGame() {
        const text = `🐍 贪吃蛇大作战 | 得分: ${score} | 最高连击: ×${maxCombo} | 游骑工作室`;
        if (navigator.share) {
            navigator.share({ title: '贪吃蛇大作战', text });
        } else {
            navigator.clipboard.writeText(text);
            alert('成绩已复制到剪贴板!');
        }
    }
    
    // ====== 操控 ======
    let touchStartX = 0, touchStartY = 0;
    
    document.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, {passive: true});
    
    document.addEventListener('touchend', e => {
        if (gameState !== 'playing') return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        const absDx = Math.abs(dx), absDy = Math.abs(dy);
        
        if (Math.max(absDx, absDy) < 15) return; // 忽略小滑动
        
        if (absDx > absDy) {
            snake.nextDir = dx > 0 ? {x: 1, y: 0} : {x: -1, y: 0};
        } else {
            snake.nextDir = dy > 0 ? {x: 0, y: 1} : {x: 0, y: -1};
        }
        
        // 禁止180度掉头
        if (snake.nextDir.x + snake.dir.x === 0 && snake.nextDir.y + snake.dir.y === 0) {
            snake.nextDir = {...snake.dir};
        }
    }, {passive: true});
    
    // 键盘支持
    document.addEventListener('keydown', e => {
        if (gameState !== 'playing') return;
        const dirs = {
            'ArrowUp': {x:0,y:-1}, 'w': {x:0,y:-1}, 'W': {x:0,y:-1},
            'ArrowDown': {x:0,y:1}, 's': {x:0,y:1}, 'S': {x:0,y:1},
            'ArrowLeft': {x:-1,y:0}, 'a': {x:-1,y:0}, 'A': {x:-1,y:0},
            'ArrowRight': {x:1,y:0}, 'd': {x:1,y:0}, 'D': {x:1,y:0},
        };
        const nd = dirs[e.key];
        if (nd) {
            if (nd.x + snake.dir.x !== 0 || nd.y + snake.dir.y !== 0) {
                snake.nextDir = nd;
            }
            e.preventDefault();
        }
    });
    </script>
</body>
</html>
